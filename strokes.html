<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Children's Drawing Explorer — Stroke by Stroke</title>
<style>
  :root{
    --bg:#f0f0f0; --panel:#f7f7f7; --panel2:#e8e8e8; --line:#d9d9d9;
    --ink:#1a1a1a; --muted:#6f6f6f; --accent:#2e6df6; --tile:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    padding:11px 18px; border-bottom:1px solid var(--line); background:var(--panel);
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  header h1{font-size:16px; margin:0; font-weight:700; letter-spacing:.2px}
  header .sub{color:var(--muted); font-size:12px}
  header .spacer{flex:1}
  .toggle{
    background:var(--panel2); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:7px 13px; cursor:pointer; font-size:13px; font-weight:600;
  }
  .toggle.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  /* panels */
  .panels{flex:1; display:flex; min-height:0}
  .panel{
    flex:1; min-width:0; display:flex; flex-direction:column;
    border-right:1px solid var(--line);
  }
  .panel:last-child{border-right:0}
  .panel-head{
    display:flex; align-items:center; gap:9px; padding:11px 14px 9px;
    border-bottom:1px solid var(--line);
  }
  select{
    background:#fff; color:var(--ink); border:1px solid var(--line);
    border-radius:7px; padding:6px 8px; font-size:13px; font-weight:600;
  }
  select.cat{text-transform:capitalize}
  .panel-head .count{color:var(--muted); font-size:12px; margin-left:auto;
    font-variant-numeric:tabular-nums}
  .panel-head .rm{
    background:none; border:0; color:var(--muted); font-size:20px; cursor:pointer;
    line-height:1; padding:0 2px;
  }
  .panel-head .rm:hover{color:#d33}
  .legend{
    display:flex; flex-wrap:wrap; gap:5px 6px; padding:9px 14px;
    border-bottom:1px solid var(--line); max-height:96px; overflow:auto;
  }
  .chip{
    display:inline-flex; align-items:center; gap:6px; padding:3px 9px 3px 6px;
    border-radius:20px; background:#fff; border:1px solid var(--line);
    cursor:pointer; font-size:12px; user-select:none;
  }
  .chip .sw{width:11px; height:11px; border-radius:50%}
  .chip.off{opacity:.4}
  .chip .cn{color:var(--muted); font-variant-numeric:tabular-nums}
  .grid-wrap{flex:1; overflow:auto; padding:14px}
  .grid{display:grid; gap:11px; grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .panels.two .grid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr))}
  .card{
    background:var(--tile); border:1px solid var(--line); border-radius:10px;
    padding:7px; cursor:pointer; transition:border-color .12s, transform .12s, box-shadow .12s;
  }
  .card:hover{border-color:var(--accent); transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(0,0,0,.09)}
  .card svg{width:100%; aspect-ratio:1; height:auto; display:block; background:var(--tile);
    border-radius:6px; overflow:hidden}
  .grid svg path{stroke-width:1.7px}
  .empty{color:var(--muted); padding:40px; text-align:center}
  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(20,22,28,.5); backdrop-filter:blur(2px);
    display:none; align-items:center; justify-content:center; z-index:20; padding:24px;
  }
  .overlay.show{display:flex}
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:min(520px,96vw); max-height:94vh; overflow:auto; padding:18px 20px;
    box-shadow:0 18px 60px rgba(0,0,0,.25);
  }
  .modal .top{display:flex; align-items:baseline; gap:10px; margin-bottom:12px}
  .modal .top h3{margin:0; font-size:17px; text-transform:capitalize}
  .modal .top .tag{color:var(--muted); font-size:12.5px}
  .modal .close{margin-left:auto; background:none; border:0; color:var(--muted);
    font-size:24px; cursor:pointer; line-height:1}
  .stage{background:#fff; border:1px solid var(--line); border-radius:10px;
    width:min(440px,70vh,100%); aspect-ratio:1; margin:0 auto; overflow:hidden}
  .stage svg{width:100%; height:100%; display:block; overflow:hidden}
  .stage svg path{stroke-width:2.8px}
  .controls{display:flex; align-items:center; gap:12px; margin:14px 0 6px}
  .btn{
    background:var(--accent); color:#fff; border:0; border-radius:8px;
    padding:8px 14px; font-weight:650; cursor:pointer; font-size:13px;
  }
  .scrub{flex:1; display:flex; align-items:center; gap:9px}
  .scrub input{flex:1}
  .scrub .lab{color:var(--muted); font-size:12px; min-width:78px; text-align:right;
    font-variant-numeric:tabular-nums}
  .speed{display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px}
  .nowpart{margin-top:6px; color:var(--muted); font-size:13px; min-height:20px}
  .nowpart b{color:var(--ink)}
  .hint{color:var(--muted); font-size:11.5px; margin-top:2px}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfcfcf;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#bcbcbc}
</style>
</head>
<body>
<header>
  <h1>Children's Drawing Explorer</h1>
  <span class="sub">stroke&#8209;by&#8209;stroke · part&#8209;labeled · ages 2–10</span>
  <span class="spacer"></span>
  <span class="sub" id="statline"></span>
  <button class="toggle" id="cmpBtn">⇄ Compare</button>
</header>

<div class="panels" id="panels"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="top">
      <h3 id="mTitle"></h3>
      <span class="tag" id="mTag"></span>
      <button class="close" id="mClose">&times;</button>
    </div>
    <div class="stage"><svg id="mStage" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="controls">
      <button class="btn" id="playBtn">▶ Play</button>
      <div class="scrub">
        <input type="range" id="scrub" min="0" max="1" step="0.001" value="1">
        <span class="lab" id="scrubLab"></span>
      </div>
      <div class="speed">
        speed
        <select id="speedSel">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </div>
    </div>
    <div class="nowpart" id="nowpart"></div>
    <div class="hint">Hover a stroke to see its part &amp; annotator agreement. Drag the slider to scrub.</div>
  </div>
</div>

<script>
const DATA_DIR = "strokes_data";
const PALETTE = ["#2e6df6","#e63946","#2a9d8f","#e9a200","#9b5de5","#f3722c",
  "#118ab2","#d6336c","#588157","#bc6c25","#b5179e","#06a77d","#ef476f",
  "#3a0ca3","#c9a200","#4c956c","#7209b7","#0096c7","#d00000","#5c8001",
  "#ad2e7e","#1d3557"];
const GRAY = "#9aa0aa";          // strokes whose part label carries no meaning
const HIDDEN = "#e6e8ec";        // strokes whose part is toggled off
const LOW_MEANING = new Set(["unintelligible","other","none","?","na","n/a",""]);

let INDEX = null, CANVAS_VB = "0 0 424 424";
const panels = [];                                   // 1 or 2 Panel objects
let thumb = {items:[], raf:0, io:null, lastTs:0};    // shared thumbnail animator

const $ = s => document.querySelector(s);
const el = (t,c,h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };

function partColorMap(ranked){
  const map={}; let pi=0;
  for(const [p] of ranked){
    map[p] = LOW_MEANING.has(p.toLowerCase()) ? GRAY : PALETTE[pi++ % PALETTE.length];
  }
  return map;
}

/* ---------------- init ---------------- */
async function init(){
  INDEX = await (await fetch(`${DATA_DIR}/index.json`)).json();
  if(INDEX.canvas) CANVAS_VB = `0 0 ${INDEX.canvas} ${INDEX.canvas}`;
  const total = INDEX.categories.reduce((a,c)=>a+c.n,0);
  $("#statline").textContent = `${INDEX.categories.length} categories · ${total} drawings`;
  addPanel(INDEX.categories[0].name);
  thumb.io = new IntersectionObserver(ents=>{
    for(const e of ents){ if(e.target._it) e.target._it.visible = e.isIntersecting; }
  }, {rootMargin:"140px"});
  thumb.raf = requestAnimationFrame(thumbTick);
  $("#cmpBtn").onclick = toggleCompare;
}

function toggleCompare(){
  if(panels.length === 1){
    // open a second panel on a different default category
    const used = panels[0].cat;
    const other = (INDEX.categories.find(c=>c.name!==used) || INDEX.categories[0]).name;
    addPanel(other);
    $("#cmpBtn").classList.add("on");
  } else {
    removePanel(panels[panels.length-1]);
    $("#cmpBtn").classList.remove("on");
  }
  $("#panels").classList.toggle("two", panels.length===2);
  panels.forEach(updateRemoveBtn);
}

/* ---------------- panel ---------------- */
function addPanel(catName){
  const root = el("div","panel");
  root.innerHTML = `
    <div class="panel-head">
      <select class="cat"></select>
      <select class="age"><option value="">all ages</option></select>
      <span class="count"></span>
      <button class="rm" title="remove">&times;</button>
    </div>
    <div class="legend"></div>
    <div class="grid-wrap"><div class="grid"></div><div class="empty" style="display:none">No drawings match.</div></div>`;
  const p = {root, cat:null, data:null, partColor:{}, hidden:new Set(), age:"", items:[]};
  const catSel = root.querySelector(".cat");
  catSel.innerHTML = INDEX.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join("");
  catSel.value = catName;
  catSel.onchange = () => loadCategory(p, catSel.value);
  root.querySelector(".age").onchange = e => { p.age = e.target.value; renderGrid(p); };
  root.querySelector(".rm").onclick = () => { if(panels.length>1){ toggleCompare(); } };
  $("#panels").appendChild(root);
  panels.push(p);
  updateRemoveBtn(p);
  loadCategory(p, catName);
  return p;
}

function removePanel(p){
  thumb.items = thumb.items.filter(it => it.panel !== p);
  p.root.remove();
  panels.splice(panels.indexOf(p),1);
}

function updateRemoveBtn(p){
  p.root.querySelector(".rm").style.display = panels.length>1 ? "" : "none";
}

async function loadCategory(p, name){
  const ranked = INDEX.parts[name];
  const data = await (await fetch(`${DATA_DIR}/${name}.json`)).json();
  p.cat = name; p.data = data.drawings;
  p.partColor = partColorMap(ranked); p.hidden = new Set();
  // age dropdown
  const ages = INDEX.categories.find(c=>c.name===name).ages;
  const ageSel = p.root.querySelector(".age");
  ageSel.innerHTML = `<option value="">all ages</option>` +
    ages.map(a=>`<option value="${a}">age ${a}</option>`).join("");
  if(!ages.includes(+p.age)) p.age = "";
  ageSel.value = p.age;
  buildLegend(p, ranked);
  renderGrid(p);
}

function buildLegend(p, ranked){
  const leg = p.root.querySelector(".legend"); leg.innerHTML = "";
  for(const [part,count] of ranked){
    const chip = el("div","chip",
      `<span class="sw" style="background:${p.partColor[part]}"></span>${part}<span class="cn">${count}</span>`);
    chip.onclick = () => {
      if(p.hidden.has(part)) p.hidden.delete(part); else p.hidden.add(part);
      chip.classList.toggle("off", p.hidden.has(part));
      renderGrid(p);
    };
    leg.appendChild(chip);
  }
}

/* ---------------- rendering ---------------- */
function strokePath(stroke, color){
  const p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d", stroke.d);
  p.setAttribute("fill","none");
  p.setAttribute("stroke", color);
  p.setAttribute("vector-effect","non-scaling-stroke");   // uniform on-screen width
  p.setAttribute("stroke-linecap","round");
  p.setAttribute("stroke-linejoin","round");
  return p;
}

function makeThumb(p, d){
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox", CANVAS_VB);
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  const paths = [];
  for(const s of d.strokes){
    const color = p.hidden.has(s.p) ? HIDDEN : (p.partColor[s.p] || GRAY);
    const path = strokePath(s, color);
    svg.appendChild(path); paths.push(path);
  }
  return {svg, paths};
}

function renderGrid(p){
  thumb.items = thumb.items.filter(it => it.panel !== p);   // drop old items
  p.items = [];
  const grid = p.root.querySelector(".grid"); grid.innerHTML = "";
  const list = p.data.filter(d => !p.age || String(d.age)===String(p.age));
  p.root.querySelector(".empty").style.display = list.length ? "none" : "block";
  p.root.querySelector(".count").textContent = `${list.length} drawings`;
  for(const d of list){
    const card = el("div","card");
    const {svg, paths} = makeThumb(p, d);
    card.appendChild(svg);
    card.title = `age ${d.age ?? "?"} · ${d.strokes.length} strokes`;
    card.onclick = () => openModal(p, d);
    grid.appendChild(card);
    const it = {panel:p, el:card, paths, delay:Math.random()*1.2};
    p.items.push(it); thumb.items.push(it);
  }
  primeItems(p.items);
}

/* ---------------- thumbnail autoplay (draws once, then stays fixed) ---------------- */
const THUMB_SPEED = 650;

function applyProgress(paths, lens, total, frac){
  const target = frac*total; let acc=0;
  for(let i=0;i<paths.length;i++){
    const L=lens[i], pe=paths[i];
    if(acc+L<=target){ pe.style.strokeDashoffset=0; acc+=L; }
    else if(acc>=target){ pe.style.strokeDashoffset=L; }
    else { pe.style.strokeDashoffset = L*(1-(target-acc)/L); acc+=L; }
  }
}

function primeItems(items){
  for(const it of items){
    it.lens = it.paths.map(pe => { try { return pe.getTotalLength(); } catch(e){ return 0.001; } });
    it.total = it.lens.reduce((a,b)=>a+b,0) || 1;
    it.paths.forEach((pe,i)=>{ const L=it.lens[i]||0.001; pe.style.strokeDasharray=L; pe.style.strokeDashoffset=L; });
    it.state="delay"; it.clock=0; it.visible=true;
    it.el._it = it; thumb.io.observe(it.el);
  }
}

function thumbTick(ts){
  if(!thumb.lastTs) thumb.lastTs = ts;
  const dt = Math.min(0.05,(ts-thumb.lastTs)/1000); thumb.lastTs = ts;
  for(const it of thumb.items){
    if(!it.visible || !it.lens) continue;
    it.clock += dt;
    if(it.state==="delay"){ if(it.clock>=it.delay){ it.state="draw"; it.clock=0; } }
    else if(it.state==="draw"){
      const dur = it.total/THUMB_SPEED, frac = Math.min(1, it.clock/dur);
      applyProgress(it.paths, it.lens, it.total, frac);
      if(frac>=1){ it.state="done"; }   // drawn once; stays fixed (fully drawn)
    }
  }
  thumb.raf = requestAnimationFrame(thumbTick);
}

/* ---------------- playback modal ---------------- */
let player = null;

function openModal(p, d){
  $("#mTitle").textContent = p.cat;
  $("#mTag").textContent = `age ${d.age ?? "?"} · ${d.strokes.length} strokes`;
  const svg = $("#mStage");
  svg.setAttribute("viewBox", CANVAS_VB);
  svg.innerHTML = "";
  const paths = [];
  d.strokes.forEach(s => {
    const path = strokePath(s, p.partColor[s.p] || GRAY);
    path.addEventListener("mousemove", () => showPart(p, s));
    svg.appendChild(path); paths.push(path);
  });
  const lens = paths.map(pe => { try { return pe.getTotalLength(); } catch(e){ return 0.001; } });
  paths.forEach((pe,i)=>{ const L=lens[i]||0.001; pe.style.strokeDasharray=L; pe.style.strokeDashoffset=L; });

  player = {p, d, paths, lens, total:lens.reduce((a,b)=>a+b,0)||1, t:0, playing:false, raf:0, last:0};
  $("#overlay").classList.add("show");
  setHandlers();
  setProgress(0);
  player.playing = true; player.last = 0;
  $("#playBtn").textContent = "❚❚ Pause";
  player.raf = requestAnimationFrame(tick);
}

function showPart(p, s){
  const e = $("#nowpart");
  if(!s){ e.innerHTML=""; return; }
  const [agreed,total] = s.a || [];
  const ag = (agreed!=null && total!=null) ? ` · ${agreed} of ${total} annotators agreed` : "";
  e.innerHTML = `Part: <b style="color:${p.partColor[s.p]||GRAY}">${s.p}</b>${ag}`;
}

function setProgress(frac){
  if(!player) return;
  player.t = Math.max(0, Math.min(1, frac));
  const target = player.t * player.total;
  let acc=0, curIdx=-1;
  for(let i=0;i<player.paths.length;i++){
    const L=player.lens[i], pe=player.paths[i];
    if(acc+L<=target){ pe.style.strokeDashoffset=0; acc+=L; curIdx=i; }
    else if(acc>=target){ pe.style.strokeDashoffset=L; }
    else { pe.style.strokeDashoffset=L*(1-(target-acc)/L); curIdx=i; acc+=L; }
  }
  $("#scrub").value = player.t;
  const shown = player.paths.filter(pe=>parseFloat(pe.style.strokeDashoffset)<1).length;
  $("#scrubLab").textContent = `${Math.min(shown,player.paths.length)}/${player.paths.length} strokes`;
  if(curIdx>=0) showPart(player.p, player.d.strokes[curIdx]);
}

function tick(ts){
  if(!player || !player.playing) return;
  if(!player.last) player.last = ts;
  const dt=(ts-player.last)/1000; player.last=ts;
  const speed=parseFloat($("#speedSel").value);
  const advance=(420*speed*dt)/player.total;
  let nt=player.t+advance;
  if(nt>=1){ nt=1; player.playing=false; $("#playBtn").textContent="▶ Play"; }
  setProgress(nt);
  if(player.playing) player.raf=requestAnimationFrame(tick);
}

function setHandlers(){
  $("#playBtn").onclick = () => {
    if(!player) return;
    if(player.playing){ player.playing=false; cancelAnimationFrame(player.raf); $("#playBtn").textContent="▶ Play"; return; }
    if(player.t>=1) setProgress(0);
    player.playing=true; player.last=0; $("#playBtn").textContent="❚❚ Pause";
    player.raf=requestAnimationFrame(tick);
  };
  $("#scrub").oninput = e => {
    if(player){ player.playing=false; cancelAnimationFrame(player.raf); $("#playBtn").textContent="▶ Play"; setProgress(parseFloat(e.target.value)); }
  };
}

function closeModal(){
  if(player){ player.playing=false; cancelAnimationFrame(player.raf); }
  $("#overlay").classList.remove("show");
}
$("#mClose").onclick = closeModal;
$("#overlay").onclick = e => { if(e.target.id==="overlay") closeModal(); };
document.addEventListener("keydown", e => {
  if(e.key==="Escape") closeModal();
  if(e.key===" " && $("#overlay").classList.contains("show")){ e.preventDefault(); $("#playBtn").click(); }
});

init();
</script>
</body>
</html>
