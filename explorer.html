<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Children's Drawing Explorer · CLIP embeddings, model &amp; kid recognition</title>
<style>
  :root { --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --line:#2a323d; --txt:#e6edf3; --muted:#8b97a7; --accent:#4ea1ff; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:308px 1fr; height:100vh; }
  /* sidebar */
  #side { background:var(--panel); border-right:1px solid var(--line); padding:16px; overflow-y:auto; }
  #side h1 { font-size:15px; margin:0 0 2px; }
  #side .sub { color:var(--muted); font-size:11px; margin-bottom:16px; }
  .group { margin-bottom:18px; }
  .group > label.h { display:block; font-weight:600; font-size:11px; letter-spacing:.04em;
    text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  select, button, input[type=search] { background:var(--panel2); color:var(--txt);
    border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:inherit; width:100%; }
  select:focus, input:focus { outline:1px solid var(--accent); }
  .rangewrap { display:flex; align-items:center; gap:8px; }
  .rangewrap input[type=range] { flex:1; accent-color:var(--accent); }
  .rangewrap .val { font-variant-numeric:tabular-nums; color:var(--muted); min-width:64px; text-align:right; }
  #legend { display:flex; flex-direction:column; gap:5px; }
  #legend .legtitle { font-weight:700; font-size:12.5px; letter-spacing:.01em; }
  #legend .legsub { color:var(--muted); font-size:11px; margin-top:-2px; }
  #legend .row { display:flex; align-items:center; gap:8px; font-size:12.5px; }
  #legend .sw { width:14px; height:14px; border-radius:3px; flex:none; }
  #legend.grad .bar { height:20px; border-radius:5px; border:1px solid rgba(255,255,255,.18); }
  #legend .gradlabels { display:flex; justify-content:space-between; color:var(--muted); font-size:11px;
    font-variant-numeric:tabular-nums; }
  .stat { color:var(--muted); font-size:11px; margin-top:6px; }
  .btnrow { display:flex; gap:6px; flex-wrap:wrap; }
  .btnrow button { cursor:pointer; width:auto; flex:1; padding:6px 4px; font-size:12px; }
  .btnrow button:hover { border-color:var(--accent); }
  .chip { cursor:pointer; width:auto; padding:5px 9px; font-size:11.5px; border-radius:20px; }
  .chip:hover { border-color:var(--accent); }
  /* category checklist */
  #catlist { max-height:188px; overflow-y:auto; border:1px solid var(--line); border-radius:8px;
    padding:6px 8px; background:var(--panel2); display:grid; grid-template-columns:1fr 1fr; gap:1px 10px; }
  #catlist label { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer;
    text-transform:capitalize; padding:2px 0; }
  #catlist input { accent-color:var(--accent); margin:0; }
  .toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; padding:6px 0; }
  .toggle input { accent-color:var(--accent); width:auto; }
  /* main */
  #main { position:relative; overflow:hidden; }
  #cv { display:block; width:100%; height:100%; cursor:crosshair; }
  #hint { position:absolute; left:14px; bottom:12px; color:var(--muted); font-size:11px;
    background:rgba(14,17,22,.7); padding:5px 9px; border-radius:7px; pointer-events:none; }
  /* detail card */
  #card { position:absolute; top:14px; right:14px; width:230px; background:var(--panel);
    border:1px solid var(--line); border-radius:11px; padding:12px; display:none; }
  #card.show { display:block; }
  #card img { width:206px; height:206px; image-rendering:auto; background:#fff; border-radius:8px; display:block; }
  #card .cat { font-weight:600; margin:9px 0 2px; font-size:14px; text-transform:capitalize; }
  #card table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  #card td { padding:2px 0; }
  #card td.k { color:var(--muted); }
  #card td.v { text-align:right; font-variant-numeric:tabular-nums; }
  #card tr.sec td { color:var(--accent); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; padding-top:7px; }
  .pill { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill.ok { background:#11351f; color:#5ed694; }
  .pill.no { background:#3a1b1b; color:#ff8a8a; }
  #close { position:absolute; top:8px; right:10px; cursor:pointer; color:var(--muted); border:none;
    background:none; font-size:18px; width:auto; padding:0; }
  #close:hover { color:var(--txt); }
  a { color:var(--accent); }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>Drawing Explorer</h1>
    <div class="sub">Children's drawings in CLIP embedding space. <span id="count"></span></div>

    <div class="group">
      <label class="h" for="colorby">Color by</label>
      <select id="colorby">
        <optgroup label="Model (CLIP)">
          <option value="target_prob">CLIP recognizability (target prob)</option>
          <option value="correct">CLIP correct / incorrect</option>
          <option value="log_odds">CLIP log-odds</option>
        </optgroup>
        <optgroup label="Human recognition (subset)">
          <option value="kid_recog">Kid recognition accuracy</option>
        </optgroup>
        <optgroup label="Category attributes">
          <option value="animacy">Animacy (animate / inanimate)</option>
          <option value="size">Real-world size (big / small)</option>
          <option value="cat">Category (hue)</option>
        </optgroup>
        <optgroup label="Other">
          <option value="age">Producer age</option>
        </optgroup>
      </select>
      <div id="legend" class="group" style="margin-top:11px;"></div>
    </div>

    <div class="group">
      <label class="h">Categories <span id="catCount" style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;"></span></label>
      <div class="btnrow" style="margin-bottom:6px;">
        <button class="chip" data-grp="__all">All</button>
        <button class="chip" data-grp="__none">None</button>
        <span id="groupChips"></span>
      </div>
      <div id="catlist"></div>
    </div>

    <div class="group">
      <label class="h">Producer age range</label>
      <div class="rangewrap">
        <input type="range" id="ageMin" min="2" max="10" value="2" step="1" />
        <input type="range" id="ageMax" min="2" max="10" value="10" step="1" />
      </div>
      <div class="stat" id="ageLabel">ages 2–10</div>
    </div>

    <div class="group">
      <label class="toggle"><input type="checkbox" id="recogOnly" /> Only drawings with kid-recognition data <span id="recogCount" style="color:var(--muted)"></span></label>
      <label class="toggle"><input type="checkbox" id="onlyCorrect" /> CLIP-correct drawings only</label>
    </div>

    <div class="group">
      <label class="h">Points</label>
      <label class="toggle"><input type="checkbox" id="showDrawings" /> Show drawings instead of dots</label>
      <select id="sketchSample" style="margin-top:6px;width:100%;">
        <option value="top">Top 10% — most CLIP-recognizable</option>
        <option value="random">Random 10%</option>
      </select>
      <div class="stat" id="sketchHint">Renders a 10% subset of the drawings in view.</div>
    </div>

    <div class="group">
      <label class="h">Map overlays</label>
      <label class="toggle"><input type="checkbox" id="showLabels" /> Category labels</label>
      <label class="toggle"><input type="checkbox" id="showThumbs" /> Example drawing per category</label>
    </div>

    <div class="group">
      <label class="h">Layout</label>
      <label class="toggle"><input type="checkbox" id="recomputeToggle" /> Recompute t-SNE on selection</label>
      <div class="stat" id="layoutStat">Showing the full-dataset t-SNE.</div>
    </div>

    <div class="group">
      <button id="reset" style="cursor:pointer;">Reset view</button>
    </div>

    <div class="stat" id="visStat"></div>
    <div class="stat" style="margin-top:14px;">Layout: t-SNE of 48-d CLIP category-probability vectors. Drag to pan · scroll to zoom · hover a point for the drawing · click to pin.</div>
  </aside>

  <main id="main">
    <canvas id="cv"></canvas>
    <div id="hint">loading data…</div>
    <div id="card">
      <button id="close">×</button>
      <img id="cardImg" alt="" />
      <div class="cat" id="cardCat"></div>
      <table><tbody id="cardTbl"></tbody></table>
    </div>
  </main>
</div>

<script>
const IMG_BASE_FALLBACKS = ["../", "./", ""];
let D = null, IMG_BASE = "../";
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const card = document.getElementById("card");
const NODATA = "#39414d";

// ---------- color helpers ----------
function lerp(a,b,t){return a+(b-a)*t;}
// low ends brightened so the darkest dots stay visible on the dark background
const VIRIDIS=[[124,58,148],[64,98,158],[33,150,142],[94,201,98],[253,231,37]];   // model
const MAGMA  =[[120,55,140],[150,60,140],[200,70,120],[252,150,100],[252,253,191]]; // human recog
function ramp(stops,t){t=Math.max(0,Math.min(1,t));const s=t*(stops.length-1);const i=Math.floor(s),f=s-i;
  const a=stops[i],b=stops[Math.min(i+1,stops.length-1)];
  return `rgb(${Math.round(lerp(a[0],b[0],f))},${Math.round(lerp(a[1],b[1],f))},${Math.round(lerp(a[2],b[2],f))})`;}
function catColor(i,n,l){return `hsl(${(i*360/n)%360},62%,${l||58}%)`;}
function hsl(h,s,l){return `hsl(${h},${s}%,${l}%)`;}
// binary category-attribute palettes
const ANIMACY_COL = {1:"#ff9f43", 0:"#4ea1ff"};   // animate=orange, inanimate=blue
const SIZE_COL    = {1:"#c879ff", 0:"#5ed694"};   // big=purple, small=green

// ---------- view transform ----------
let scale=1, tx=0, ty=0, fit={s:1,ox:0,oy:0};
function worldToScreen(x,y){return [ (x*fit.s+fit.ox)*scale+tx, (y*fit.s+fit.oy)*scale+ty ];}

function resize(){
  const r=cv.parentElement.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+"px"; cv.style.height=r.height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeFit(r.width,r.height); draw();
}
function computeFit(w,h){
  const pad=40, s=Math.min((w-2*pad)/1000,(h-2*pad)/1000);
  fit.s=s; fit.ox=(w-1000*s)/2; fit.oy=(h-1000*s)/2;
}

// ---------- filters ----------
const F = { cats:new Set(), ageMin:2, ageMax:10, recogOnly:false, correctOnly:false,
            showLabels:false, showThumbs:false, showDrawings:false, sketchSample:"top" };
function catSelected(i){ return F.cats.size===0 || F.cats.has(D.cat[i]); }
let activeSet=null;  // when a custom t-SNE layout is active, only these indices are shown
function passes(i){
  if(activeSet){ if(!activeSet.has(i)) return false; }   // frozen selection; age/recog still filter
  else if(!catSelected(i)) return false;
  const a=D.age[i]; if(a<F.ageMin||a>F.ageMax) return false;
  if(F.recogOnly && D.kid_recog[i]==null) return false;
  if(F.correctOnly && !D.correct[i]) return false;
  return true;
}

// ---------- color mode ----------
let colorMode="target_prob";
const HUMAN_MODES = {kid_recog:1};
// returns a color, or null meaning "no data" (recognition modes only)
function colorOf(i){
  switch(colorMode){
    case "correct": return D.correct[i] ? "#5ed694" : "#ff6b6b";
    case "target_prob": return ramp(VIRIDIS, D.target_prob[i]);
    case "log_odds": return ramp(VIRIDIS, (D.log_odds[i]+10)/16);
    case "kid_recog": { const v=D.kid_recog[i]; return v==null?null:ramp(MAGMA,v); }
    case "animacy": { const a=D.cat_animacy[D.cat[i]]; return a==null?NODATA:ANIMACY_COL[a]; }
    case "size": { const s=D.cat_size[D.cat[i]]; return s==null?NODATA:SIZE_COL[s]; }
    case "age": return hsl(lerp(220,12,(D.age[i]-2)/8), 70, 58);
    case "cat": return catColor(D.cat[i], D.categories.length);
  }
}

// ---------- map overlays (per-category example drawing at the t-SNE endpoint + label) ----------
let sketchKeep=new Set(), sketchDirty=true;
let OV=[], overlaysDirty=true; sketchDirty=true;
function recomputeOverlays(){
  OV=[];
  const n=D.categories.length, byCat=Array.from({length:n},()=>[]);
  let cx=0, cy=0, tot=0;
  for(let i=0;i<D.n;i++){
    if(!passes(i)) continue;
    byCat[D.cat[i]].push(i); cx+=D.x[i]; cy+=D.y[i]; tot++;
  }
  if(!tot) return;
  cx/=tot; cy/=tot;
  // representative drawing = ~85th-percentile distance from the visible centroid:
  // out on the category's arm, but robust to lone outliers (which fly to the edge).
  for(let c=0;c<n;c++){
    const pts=byCat[c]; if(!pts.length) continue;
    pts.sort((a,b)=>((D.x[a]-cx)**2+(D.y[a]-cy)**2)-((D.x[b]-cx)**2+(D.y[b]-cy)**2));
    OV.push({cat:c, idx:pts[Math.min(pts.length-1, Math.floor(0.85*(pts.length-1)))]});
  }
}
const imgCache=new Map(); let rafQueued=false;
function queueDraw(){ if(rafQueued) return; rafQueued=true; requestAnimationFrame(()=>{rafQueued=false;draw();}); }
// Throttled image loader: GitHub Pages 429-rate-limits bursts of requests, so
// load at most MAX_CONC at a time and back off / retry on errors.
const MAX_CONC=5; let activeLoads=0; const loadQ=[];
function getImg(file){
  let e=imgCache.get(file);
  if(e) return e.img;
  e={img:new Image(), tries:0};
  imgCache.set(file,e);
  loadQ.push(file); pumpLoads();
  return e.img;
}
function pumpLoads(){
  while(activeLoads<MAX_CONC && loadQ.length){
    const file=loadQ.shift(), e=imgCache.get(file);
    if(!e || (e.img.complete && e.img.naturalWidth)) continue;
    activeLoads++;
    e.img.onload =()=>{ activeLoads--; queueDraw(); pumpLoads(); };
    e.img.onerror=()=>{ activeLoads--;
      if(++e.tries<4) setTimeout(()=>{ loadQ.push(file); pumpLoads(); }, 2000*e.tries+Math.random()*1000);
      pumpLoads();
    };
    e.img.src=IMG_BASE+D.draw_dir+"/"+file;
  }
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawOverlays(){
  const w=cv.clientWidth, h=cv.clientHeight, nC=D.categories.length;
  const showT=F.showThumbs, showL=F.showLabels;
  if(!showT && !showL) return;
  const s=Math.max(40, Math.min(86, 44*Math.sqrt(scale)));
  ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.font="700 12px -apple-system,Segoe UI,Roboto,sans-serif";
  // both the example drawing AND its label live at the category's t-SNE endpoint,
  // so labels stay spread out (not piled in the dense centre) and pair with the image.
  for(const o of OV){
    const [px,py]=worldToScreen(D.x[o.idx],D.y[o.idx]);
    if(px<-s||py<-s-20||px>w+s||py>h+s+20) continue;
    const col=colorOf(o.idx)||catColor(o.cat,nC);
    if(showT){
      const x=px-s/2, y=py-s/2;
      ctx.save(); ctx.shadowColor="rgba(0,0,0,.55)"; ctx.shadowBlur=9; ctx.shadowOffsetY=1;
      ctx.fillStyle="#fff"; roundRect(x,y,s,s,6); ctx.fill(); ctx.restore();
      const img=getImg(D.file[o.idx]);
      if(img.complete && img.naturalWidth){ ctx.save(); roundRect(x,y,s,s,6); ctx.clip(); ctx.drawImage(img,x,y,s,s); ctx.restore(); }
      ctx.lineWidth=2.5; ctx.strokeStyle=col; roundRect(x,y,s,s,6); ctx.stroke();
    }
    if(showL){
      const t=D.categories[o.cat];
      const ly = showT ? py + s/2 + 4 : py - 6;
      ctx.lineWidth=3.5; ctx.strokeStyle="rgba(10,13,18,.95)"; ctx.strokeText(t,px,ly);
      ctx.fillStyle = showT ? "#fff" : catColor(o.cat,nC,76); ctx.fillText(t,px,ly);
    }
  }
}

// ---------- tinted drawings (ink is opaque, background transparent) ----------
// reusable offscreen canvas: paint the drawing, then flood its ink with the
// point's color via "source-in" so each sketch is colored like its dot.
const SCR=56, scr=document.createElement("canvas"); scr.width=scr.height=SCR;
const sctx=scr.getContext("2d");
function drawTinted(img,col,x,y,s){
  sctx.clearRect(0,0,SCR,SCR);
  sctx.globalCompositeOperation="source-over"; sctx.drawImage(img,0,0,SCR,SCR);
  sctx.globalCompositeOperation="source-in";   sctx.fillStyle=col; sctx.fillRect(0,0,SCR,SCR);
  sctx.globalCompositeOperation="source-over";
  ctx.drawImage(scr,0,0,SCR,SCR,x,y,s,s);
}
// sketch mode shows only the top 10% most CLIP-recognizable drawings (by
// target_prob) among the currently-visible subset — clearer and far lighter
// than rendering all ~37k images. (sketchKeep/sketchDirty declared near OV.)
const MAX_SKETCHES=900;   // hard cap so we never burst thousands of image requests
function recomputeSketchSet(){
  const idx=[];
  for(let i=0;i<D.n;i++) if(passes(i)) idx.push(i);
  const k=Math.min(MAX_SKETCHES, Math.max(1, Math.ceil(idx.length*0.10)));
  if(F.sketchSample==="random"){
    for(let m=0;m<k && m<idx.length;m++){   // partial Fisher–Yates: pick k at random
      const j=m+Math.floor(Math.random()*(idx.length-m)); const t=idx[m]; idx[m]=idx[j]; idx[j]=t;
    }
  } else {
    idx.sort((a,b)=>D.target_prob[b]-D.target_prob[a]);   // most recognizable first
  }
  sketchKeep=new Set(idx.slice(0,k));
  sketchDirty=false;
}
function drawSketches(w,h,human){
  if(sketchDirty) recomputeSketchSet();
  const s=Math.max(11,Math.min(86,13*scale));   // sketch size scales with zoom
  for(const i of sketchKeep){
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
    if(sx<-s||sy<-s||sx>w+s||sy>h+s) continue;
    const img=getImg(D.file[i]);
    if(!(img.complete && img.naturalWidth)) continue;
    const col=colorOf(i);
    ctx.globalAlpha = col===null ? 0.16 : 0.82;   // no-data sketches stay faint
    drawTinted(img, col||NODATA, sx-s/2, sy-s/2, s);
  }
  ctx.globalAlpha=1;
}

// ---------- drawing ----------
let hoverIdx=-1, pinIdx=-1;
// dot passes; `skip` indices are drawn elsewhere (as sketches), `dim` fades the
// remaining context dots so the sketches on top stand out.
function drawDots(w,h,human,skip,dim){
  const r = Math.max(1.1, Math.min(3.6, 1.0*scale));
  if(human){   // pass 1: no-data points faint (so the lit subset pops in recog modes)
    ctx.globalAlpha=dim?0.1:0.18; ctx.fillStyle=NODATA;
    for(let i=0;i<D.n;i++){
      if(!passes(i) || D[colorMode][i]!=null) continue;
      if(skip && skip.has(i)) continue;
      const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
      if(sx<-4||sy<-4||sx>w+4||sy>h+4) continue;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill();
    }
  }
  ctx.globalAlpha=dim?0.45:0.82;   // pass 2: colored points
  for(let i=0;i<D.n;i++){
    if(!passes(i)) continue;
    if(skip && skip.has(i)) continue;
    const col=colorOf(i); if(col===null) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
    if(sx<-4||sy<-4||sx>w+4||sy>h+4) continue;
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(sx,sy,human?r+0.6:r,0,6.283); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function draw(){
  if(overlaysDirty){ recomputeOverlays(); overlaysDirty=false; }
  const w=cv.clientWidth,h=cv.clientHeight;
  ctx.clearRect(0,0,w,h);
  const human = HUMAN_MODES[colorMode];
  if(F.showDrawings){
    if(sketchDirty) recomputeSketchSet();
    drawDots(w,h,human,sketchKeep,true);   // remaining drawings shown as faint dots
    drawSketches(w,h,human);               // the 10% subset shown as sketches
  } else {
    drawDots(w,h,human,null,false);
  }
  drawHoverPin();
  drawOverlays();
}
function drawHoverPin(){
  for(const [idx,col,rad] of [[pinIdx,"#fff",6],[hoverIdx,"#fff",5]]){
    if(idx<0||!passes(idx)) continue;
    const [sx,sy]=worldToScreen(D.x[idx],D.y[idx]);
    ctx.beginPath(); ctx.arc(sx,sy,rad,0,6.283); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
    const c=colorOf(idx); ctx.beginPath(); ctx.arc(sx,sy,rad-2,0,6.283); ctx.fillStyle=c||NODATA; ctx.fill();
  }
}

// ---------- nearest ----------
function nearest(px,py){
  let best=-1, bd=14*14;
  for(let i=0;i<D.n;i++){
    if(!passes(i)) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
    const dx=sx-px, dy=sy-py, d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=i;}
  }
  return best;
}

// ---------- detail card ----------
function fmt(v,d=2){ return (v==null||isNaN(v)) ? "—" : (+v).toFixed(d); }
function pct(v){ return v==null ? "—" : Math.round(v*100)+"%"; }
function showCard(i){
  if(i<0) return;
  card.classList.add("show");
  document.getElementById("cardImg").src = IMG_BASE + D.draw_dir + "/" + D.file[i];
  const an=D.cat_animacy[D.cat[i]], sz=D.cat_size[D.cat[i]];
  const attrs=[an==null?null:(an?"animate":"inanimate"), sz==null?null:(sz?"big":"small")].filter(Boolean).join(" · ");
  document.getElementById("cardCat").textContent = D.categories[D.cat[i]] + " · age " + D.age[i] + (attrs?"  ("+attrs+")":"");
  const guess = D.guess[i]>=0 ? D.categories[D.guess[i]] : "—";
  const ok = D.correct[i];
  const kr=D.kid_recog[i];
  let human;
  if(kr!=null){
    human = `<tr class="sec"><td colspan="2">Kid recognition</td></tr>
      <tr><td class="k">kids correct</td><td class="v">${pct(kr)} <span class="k">(n=${D.kid_recog_n[i]})</span></td></tr>`;
  } else {
    human = `<tr class="sec"><td colspan="2">Kid recognition</td></tr>
      <tr><td class="k" colspan="2">not in recognition games</td></tr>`;
  }
  document.getElementById("cardTbl").innerHTML = `
    <tr class="sec"><td colspan="2">Model (CLIP)</td></tr>
    <tr><td class="k">CLIP guess</td><td class="v">${guess} <span class="pill ${ok?'ok':'no'}">${ok?'correct':'wrong'}</span></td></tr>
    <tr><td class="k">target prob</td><td class="v">${fmt(D.target_prob[i],3)}</td></tr>
    <tr><td class="k">log-odds</td><td class="v">${fmt(D.log_odds[i],2)}</td></tr>
    ${human}
    <tr class="sec"><td colspan="2">Drawing</td></tr>
    <tr><td class="k"># strokes</td><td class="v">${D.strokes[i]==null?'—':D.strokes[i]}</td></tr>
    <tr><td class="k">draw time (s)</td><td class="v">${fmt(D.duration[i],1)}</td></tr>`;
}
document.getElementById("close").onclick=()=>{card.classList.remove("show");pinIdx=-1;draw();};

// ---------- legend ----------
function buildLegend(){
  const el=document.getElementById("legend");
  const title=(t,sub)=>`<div class="legtitle">${t}</div>`+(sub?`<div class="legsub">${sub}</div>`:``);
  // ticks: array of labels spread evenly across the bar (so use values that sit
  // at the bar's 0 / mid / 1 positions for the mode's linear domain)
  const gradLegend=(t,sub,stops,ticks,noData)=>{
    el.className="group grad";
    el.innerHTML=title(t,sub)
      +`<div class="bar" style="background:linear-gradient(90deg,${stops})"></div>`
      +`<div class="gradlabels">${ticks.map(x=>`<span>${x}</span>`).join("")}</div>`
      +(noData?`<div class="row" style="margin-top:7px;"><span class="sw" style="background:${NODATA};opacity:.6"></span>no data (not in recognition games)</div>`:``);
  };
  const swatches=(t,sub,rows)=>{
    el.className="group";
    el.innerHTML=title(t,sub)+rows.map(([c,l])=>`<div class="row"><span class="sw" style="background:${c}"></span>${l}</div>`).join("");
  };
  const V=VIRIDIS.map(c=>`rgb(${c})`).join(","), M=MAGMA.map(c=>`rgb(${c})`).join(",");
  if(colorMode==="correct"){
    swatches("CLIP classification", "did CLIP pick the intended category?",
      [["#5ed694","Correctly classified"],["#ff6b6b","Misclassified"]]);
  } else if(colorMode==="animacy"){
    swatches("Animacy", "category attribute",
      [[ANIMACY_COL[1],"Animate (animals, people)"],[ANIMACY_COL[0],"Inanimate (objects)"]]);
  } else if(colorMode==="size"){
    swatches("Real-world size", "category attribute",
      [[SIZE_COL[1],"Big"],[SIZE_COL[0],"Small"]]);
  } else if(colorMode==="cat"){
    el.className="group";
    el.innerHTML=title("Category","hue = one of 48 categories")
      +`<div class="stat">Use the checklist to isolate categories or groups.</div>`;
  } else if(colorMode==="target_prob"){
    gradLegend("CLIP recognizability","P(intended category)", V, ["0","0.5","1"], false);
  } else if(colorMode==="log_odds"){
    gradLegend("CLIP log-odds","intended vs. all other categories", V, ["−10","−2","+6"], false);
  } else if(colorMode==="kid_recog"){
    gradLegend("Kid recognition accuracy","% of children who guessed right", M, ["0%","50%","100%"], true);
  } else if(colorMode==="age"){
    gradLegend("Producer age","age of the child who drew it",
      `${hsl(220,70,58)},${hsl(116,70,58)},${hsl(12,70,58)}`, ["2","6","10"], false);
  }
}

// ---------- visible stat ----------
function updateStat(){
  let n=0, corr=0, sp=0, kr=0, krn=0;
  for(let i=0;i<D.n;i++){ if(!passes(i))continue; n++; corr+=D.correct[i]; sp+=D.target_prob[i];
    if(D.kid_recog[i]!=null){kr+=D.kid_recog[i];krn++;} }
  const human=HUMAN_MODES[colorMode];
  let s=`${n.toLocaleString()} drawings shown · ${n?Math.round(100*corr/n):0}% CLIP-correct`;
  if(human) s+=` · ${krn} with kid-recog (mean ${krn?Math.round(100*kr/krn):0}%)`;
  else s+=` · mean recog ${n?(sp/n).toFixed(2):'—'}`;
  document.getElementById("visStat").textContent=s;
}

// ---------- interactions ----------
let dragging=false, moved=false, lastX=0, lastY=0;
cv.addEventListener("mousedown",e=>{dragging=true;moved=false;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener("mouseup",()=>{dragging=false;});
cv.addEventListener("mousemove",e=>{
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  if(dragging){ const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    tx+=dx; ty+=dy; lastX=e.clientX; lastY=e.clientY; draw(); return; }
  const hh=nearest(px,py);
  if(hh!==hoverIdx){ hoverIdx=hh; draw(); if(hh>=0 && pinIdx<0) showCard(hh); else if(hh<0 && pinIdx<0) card.classList.remove("show"); }
});
cv.addEventListener("click",e=>{
  if(moved) return;
  const rect=cv.getBoundingClientRect();
  const hh=nearest(e.clientX-rect.left, e.clientY-rect.top);
  if(hh>=0){ pinIdx=hh; showCard(hh); draw(); }
});
cv.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  const f=Math.exp(-e.deltaY*0.0015);
  tx=px-(px-tx)*f; ty=py-(py-ty)*f; scale*=f;
  scale=Math.max(0.4,Math.min(60,scale)); draw();
},{passive:false});

// ---------- category checklist ----------
function refreshCatUI(){
  document.querySelectorAll("#catlist input").forEach(cb=>{ cb.checked = F.cats.has(+cb.value); });
  const sel = F.cats.size;
  document.getElementById("catCount").textContent = `(${sel===0?'none':sel===D.categories.length?'all':sel} selected)`;
}
function buildCatList(){
  const list=document.getElementById("catlist");
  D.categories.forEach((c,i)=>{
    const lab=document.createElement("label");
    lab.innerHTML=`<input type="checkbox" value="${i}" checked> ${c}`;
    lab.querySelector("input").onchange=e=>{
      if(e.target.checked) F.cats.add(i); else F.cats.delete(i);
      exitCustom(); overlaysDirty=true; sketchDirty=true; refreshCatUI(); draw(); updateStat();
    };
    list.appendChild(lab);
  });
  // semantic quick-groups from the category attributes (cover all 48 categories)
  const idxs=D.categories.map((_,i)=>i);
  D.groups = {
    "Animate":   idxs.filter(i=>D.cat_animacy[i]===1),
    "Inanimate": idxs.filter(i=>D.cat_animacy[i]===0),
    "Big":       idxs.filter(i=>D.cat_size[i]===1),
    "Small":     idxs.filter(i=>D.cat_size[i]===0),
  };
  // group quick-chips
  const chips=document.getElementById("groupChips");
  Object.keys(D.groups||{}).forEach(label=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=label; b.dataset.grp=label;
    chips.appendChild(b);
  });
  document.querySelectorAll(".chip").forEach(b=>{
    b.onclick=()=>{
      const g=b.dataset.grp;
      if(g==="__all") D.categories.forEach((_,i)=>F.cats.add(i));
      else if(g==="__none") F.cats.clear();
      else { F.cats.clear(); D.groups[g].forEach(i=>F.cats.add(i)); }
      exitCustom(); overlaysDirty=true; sketchDirty=true; refreshCatUI(); draw(); updateStat();
    };
  });
}

// ---------- controls ----------
document.getElementById("colorby").onchange=e=>{colorMode=e.target.value;buildLegend();draw();updateStat();};
function syncAge(){
  let lo=+ageMin.value, hi=+ageMax.value; if(lo>hi){[lo,hi]=[hi,lo];}
  F.ageMin=lo;F.ageMax=hi;
  document.getElementById("ageLabel").textContent = lo===hi?`age ${lo}`:`ages ${lo}–${hi}`;
  overlaysDirty=true; sketchDirty=true; draw();updateStat();
}
const ageMin=document.getElementById("ageMin"), ageMax=document.getElementById("ageMax");
ageMin.oninput=syncAge; ageMax.oninput=syncAge;
document.getElementById("recogOnly").onchange=e=>{F.recogOnly=e.target.checked;overlaysDirty=true; sketchDirty=true;draw();updateStat();};
document.getElementById("onlyCorrect").onchange=e=>{F.correctOnly=e.target.checked;overlaysDirty=true; sketchDirty=true;draw();updateStat();};
document.getElementById("showDrawings").onchange=e=>{F.showDrawings=e.target.checked;sketchDirty=true;draw();};
document.getElementById("sketchSample").onchange=e=>{
  F.sketchSample=e.target.value; sketchDirty=true;
  document.getElementById("sketchHint").textContent = e.target.value==="random"
    ? "Renders a random 10% of the drawings in view (max 900)."
    : "Renders the top 10% most CLIP-recognizable drawings in view (max 900).";
  draw();
};
document.getElementById("showLabels").onchange=e=>{F.showLabels=e.target.checked;draw();};
document.getElementById("showThumbs").onchange=e=>{F.showThumbs=e.target.checked;draw();};
document.getElementById("reset").onclick=()=>{scale=1;tx=0;ty=0;resize();};
window.addEventListener("resize",resize);

// ---------- client-side t-SNE recompute on the current selection ----------
// compact t-SNE (adapted from karpathy/tsnejs, MIT) — runs on the 48-d CLIP vectors
const RECOMPUTE_CAP = 1200;
let FEATS=null;           // Uint8Array(n*dim), lazily fetched
let tsneTimer=null;
function gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
async function loadFeats(){
  if(FEATS) return FEATS;
  const buf=await (await fetch("features.u8.bin")).arrayBuffer();
  FEATS=new Uint8Array(buf); return FEATS;
}
function vecOf(i){ const d=D.feat_dim, o=i*d, v=new Float64Array(d);
  for(let k=0;k<d;k++) v[k]=FEATS[o+k]/255; return v; }

function makeTsne(X){
  const N=X.length, dim=X[0].length, perp=Math.min(30, Math.max(5,(N-1)/3)), eps=12;
  // pairwise squared distances on standardized features
  const mean=new Float64Array(dim), sd=new Float64Array(dim);
  for(const r of X) for(let d=0;d<dim;d++) mean[d]+=r[d];
  for(let d=0;d<dim;d++) mean[d]/=N;
  for(const r of X) for(let d=0;d<dim;d++){ const t=r[d]-mean[d]; sd[d]+=t*t; }
  for(let d=0;d<dim;d++) sd[d]=Math.sqrt(sd[d]/N)||1;
  const Z=X.map(r=>{ const z=new Float64Array(dim); for(let d=0;d<dim;d++) z[d]=(r[d]-mean[d])/sd[d]; return z; });
  const Dist=new Float64Array(N*N);
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){ let s=0; for(let d=0;d<dim;d++){const t=Z[i][d]-Z[j][d];s+=t*t;} Dist[i*N+j]=s; Dist[j*N+i]=s; }
  // P with per-point perplexity calibration
  const P=new Float64Array(N*N), logU=Math.log(perp);
  for(let i=0;i<N;i++){
    let beta=1, lo=-Infinity, hi=Infinity; const row=new Float64Array(N);
    for(let it=0;it<50;it++){
      let sum=0;
      for(let j=0;j<N;j++){ if(i===j){row[j]=0;continue;} const p=Math.exp(-Dist[i*N+j]*beta); row[j]=p; sum+=p; }
      sum=sum||1e-12; let H=0;
      for(let j=0;j<N;j++){ const p=row[j]/sum; row[j]=p; if(p>1e-12) H-=p*Math.log(p); }
      const diff=H-logU;
      if(Math.abs(diff)<1e-5) break;
      if(diff>0){ lo=beta; beta=(hi===Infinity)?beta*2:(beta+hi)/2; }
      else { hi=beta; beta=(lo===-Infinity)?beta/2:(beta+lo)/2; }
    }
    for(let j=0;j<N;j++) P[i*N+j]=row[j];
  }
  let psum=0;
  for(let i=0;i<N;i++) for(let j=0;j<N;j++){ const v=P[i*N+j]+P[j*N+i]; P[i*N+j]=v; psum+=v; }
  psum=psum||1e-12;
  for(let k=0;k<N*N;k++) P[k]=Math.max(P[k]/psum,1e-12);
  let Y=[]; for(let i=0;i<N;i++) Y.push([gauss()*1e-4, gauss()*1e-4]);
  const gains=Y.map(()=>[1,1]), step=Y.map(()=>[0,0]);
  let iter=0;
  return { Y, next(){
    iter++;
    const Q=new Float64Array(N*N); let qsum=0;
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){ const a=Y[i][0]-Y[j][0], b=Y[i][1]-Y[j][1];
      const q=1/(1+a*a+b*b); Q[i*N+j]=q; Q[j*N+i]=q; qsum+=2*q; }
    qsum=qsum||1e-12;
    const exa=iter<100?4:1, mom=iter<250?0.5:0.8;
    for(let i=0;i<N;i++){ let gx=0,gy=0;
      for(let j=0;j<N;j++){ if(i===j) continue;
        const pm=exa*P[i*N+j]-Q[i*N+j]/qsum, m=4*pm*Q[i*N+j];
        gx+=m*(Y[i][0]-Y[j][0]); gy+=m*(Y[i][1]-Y[j][1]); }
      const g=[gx,gy];
      for(let d=0;d<2;d++){
        gains[i][d]=Math.max((Math.sign(g[d])===Math.sign(step[i][d]))?gains[i][d]*0.8:gains[i][d]+0.2, 0.01);
        step[i][d]=mom*step[i][d]-eps*gains[i][d]*g[d];
        Y[i][d]+=step[i][d];
      }
    }
    let mx=0,my=0; for(const y of Y){mx+=y[0];my+=y[1];} mx/=N;my/=N;
    for(const y of Y){ y[0]-=mx; y[1]-=my; }
    return iter;
  }};
}
function pctile(sorted, p){ return sorted[Math.min(sorted.length-1, Math.max(0, Math.round(p*(sorted.length-1))))]; }
function normalizeInto(members, Y){
  // robust scaling: map the 2nd–98th percentile range to the view, clamp outliers
  // to the edge so a few fliers don't compress the whole cloud into a dot.
  const xs=Y.map(y=>y[0]).sort((a,b)=>a-b), ys=Y.map(y=>y[1]).sort((a,b)=>a-b);
  const x0=pctile(xs,0.02), x1=pctile(xs,0.98), y0=pctile(ys,0.02), y1=pctile(ys,0.98);
  const cx=(x0+x1)/2, cy=(y0+y1)/2, span=Math.max(x1-x0, y1-y0)||1;
  for(let k=0;k<members.length;k++){
    const nx=(Y[k][0]-cx)/span*900+500, ny=(Y[k][1]-cy)/span*900+500;
    D.x[members[k]] = Math.max(8, Math.min(992, nx));
    D.y[members[k]] = Math.max(8, Math.min(992, ny));
  }
}
async function recompute(){
  if(tsneTimer){ clearInterval(tsneTimer); tsneTimer=null; }
  const setEl=document.getElementById("layoutStat"), tog=document.getElementById("recomputeToggle");
  // members = currently visible points under the (global) filters
  activeSet=null;
  let members=[]; for(let i=0;i<D.n;i++) if(passes(i)) members.push(i);
  if(members.length<10){ setEl.textContent="Select at least ~10 drawings to recompute."; tog.checked=false; return; }
  let sampled=false;
  if(members.length>RECOMPUTE_CAP){
    // random subsample for responsiveness
    for(let k=members.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [members[k],members[j]]=[members[j],members[k]]; }
    members=members.slice(0,RECOMPUTE_CAP); sampled=true;
  }
  tog.disabled=true; setEl.textContent="Loading features…";
  await loadFeats();
  const X=members.map(vecOf);
  setEl.textContent=`Running t-SNE on ${members.length} drawings…`;
  const eng=makeTsne(X);
  activeSet=new Set(members);
  scale=1; tx=0; ty=0; computeFit(cv.clientWidth,cv.clientHeight);
  const ITERS=300;
  tsneTimer=setInterval(()=>{
    let it=0; for(let s=0;s<3;s++) it=eng.next();   // 3 iters per tick
    normalizeInto(members, eng.Y); overlaysDirty=true; sketchDirty=true; draw();
    if(it>=ITERS){ clearInterval(tsneTimer); tsneTimer=null; tog.disabled=false;
      setEl.innerHTML=`Custom t-SNE on <b>${members.length}</b> drawings${sampled?` (random sample of the selection)`:''}.`;
      updateStat(); }
  }, 0);
}
function exitCustom(){
  if(!activeSet && !tsneTimer) return;
  if(tsneTimer){ clearInterval(tsneTimer); tsneTimer=null; }
  for(let i=0;i<D.n;i++){ D.x[i]=D.gx[i]; D.y[i]=D.gy[i]; }
  activeSet=null; overlaysDirty=true; sketchDirty=true;
  const tog=document.getElementById("recomputeToggle"); tog.checked=false; tog.disabled=false;
  document.getElementById("layoutStat").textContent="Showing the full-dataset t-SNE.";
}
function restoreLayout(){ exitCustom(); scale=1; tx=0; ty=0; resize(); updateStat(); }
document.getElementById("recomputeToggle").onchange=e=>{ if(e.target.checked) recompute(); else restoreLayout(); };

// ---------- load ----------
async function load(){
  const res=await fetch("points.json"); D=await res.json();
  D.gx=D.x.slice(); D.gy=D.y.slice();   // keep the full-dataset layout for "restore"
  D.categories.forEach((_,i)=>F.cats.add(i));
  buildCatList(); refreshCatUI();
  const krn=D.kid_recog.filter(v=>v!=null).length;
  document.getElementById("count").textContent=`${D.n.toLocaleString()} drawings · ${D.categories.length} categories · ages 2–10. ${krn.toLocaleString()} have kid-recognition data.`;
  document.getElementById("recogCount").textContent=`(${krn})`;
  document.getElementById("hint").textContent="drag to pan · scroll to zoom · hover for the drawing";
  await probeBase();
  buildLegend(); resize(); updateStat();
}
function probeBase(){
  return new Promise(resolve=>{
    let k=0;
    const test=()=>{
      if(k>=IMG_BASE_FALLBACKS.length){resolve();return;}
      const im=new Image();
      im.onload=()=>{IMG_BASE=IMG_BASE_FALLBACKS[k];resolve();};
      im.onerror=()=>{k++;test();};
      im.src=IMG_BASE_FALLBACKS[k]+D.draw_dir+"/"+D.file[0];
    };
    test();
  });
}
load();
</script>
