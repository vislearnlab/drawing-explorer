<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Children's Drawing Explorer · CLIP embeddings &amp; recognizability</title>
<style>
  :root { --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --line:#2a323d; --txt:#e6edf3; --muted:#8b97a7; --accent:#4ea1ff; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:300px 1fr; height:100vh; }
  /* sidebar */
  #side { background:var(--panel); border-right:1px solid var(--line); padding:16px; overflow-y:auto; }
  #side h1 { font-size:15px; margin:0 0 2px; }
  #side .sub { color:var(--muted); font-size:11px; margin-bottom:16px; }
  .group { margin-bottom:18px; }
  .group > label.h { display:block; font-weight:600; font-size:11px; letter-spacing:.04em;
    text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  select, button, input[type=search] { background:var(--panel2); color:var(--txt);
    border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:inherit; width:100%; }
  select:focus, input:focus { outline:1px solid var(--accent); }
  .rangewrap { display:flex; align-items:center; gap:8px; }
  .rangewrap input[type=range] { flex:1; accent-color:var(--accent); }
  .rangewrap .val { font-variant-numeric:tabular-nums; color:var(--muted); min-width:64px; text-align:right; }
  #legend { display:flex; flex-direction:column; gap:4px; }
  #legend .row { display:flex; align-items:center; gap:8px; font-size:12px; }
  #legend .sw { width:13px; height:13px; border-radius:3px; flex:none; }
  #legend.grad .bar { height:12px; border-radius:4px; flex:1; }
  #legend .gradlabels { display:flex; justify-content:space-between; color:var(--muted); font-size:11px; }
  .stat { color:var(--muted); font-size:11px; margin-top:6px; }
  .btnrow { display:flex; gap:8px; }
  .btnrow button { cursor:pointer; }
  .btnrow button:hover { border-color:var(--accent); }
  /* main */
  #main { position:relative; overflow:hidden; }
  #cv { display:block; width:100%; height:100%; cursor:crosshair; }
  #hint { position:absolute; left:14px; bottom:12px; color:var(--muted); font-size:11px;
    background:rgba(14,17,22,.7); padding:5px 9px; border-radius:7px; pointer-events:none; }
  /* detail card */
  #card { position:absolute; top:14px; right:14px; width:230px; background:var(--panel);
    border:1px solid var(--line); border-radius:11px; padding:12px; display:none; }
  #card.show { display:block; }
  #card img { width:206px; height:206px; image-rendering:auto; background:#fff; border-radius:8px; display:block; }
  #card .cat { font-weight:600; margin:9px 0 2px; font-size:14px; text-transform:capitalize; }
  #card table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  #card td { padding:2px 0; }
  #card td.k { color:var(--muted); }
  #card td.v { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill.ok { background:#11351f; color:#5ed694; }
  .pill.no { background:#3a1b1b; color:#ff8a8a; }
  #close { position:absolute; top:8px; right:10px; cursor:pointer; color:var(--muted); border:none;
    background:none; font-size:18px; width:auto; padding:0; }
  #close:hover { color:var(--txt); }
  a { color:var(--accent); }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>Drawing Explorer</h1>
    <div class="sub">Children's drawings in CLIP embedding space, colored by model recognizability. <span id="count"></span></div>

    <div class="group">
      <label class="h" for="colorby">Color by</label>
      <select id="colorby">
        <option value="target_prob">CLIP recognizability (target prob)</option>
        <option value="correct">CLIP correct / incorrect</option>
        <option value="log_odds">CLIP log-odds</option>
        <option value="age">Age</option>
        <option value="cat">Category</option>
      </select>
      <div id="legend" class="group" style="margin-top:11px;"></div>
    </div>

    <div class="group">
      <label class="h" for="catfilter">Category</label>
      <select id="catfilter"><option value="-1">All categories</option></select>
    </div>

    <div class="group">
      <label class="h">Age range</label>
      <div class="rangewrap">
        <input type="range" id="ageMin" min="2" max="10" value="2" step="1" />
        <input type="range" id="ageMax" min="2" max="10" value="10" step="1" />
      </div>
      <div class="stat" id="ageLabel">ages 2–10</div>
    </div>

    <div class="group">
      <label class="h" for="recog">Min CLIP recognizability</label>
      <div class="rangewrap">
        <input type="range" id="recog" min="0" max="100" value="0" step="1" />
        <span class="val" id="recogVal">≥ 0%</span>
      </div>
    </div>

    <div class="group">
      <div class="btnrow">
        <button id="reset">Reset view</button>
        <button id="onlyCorrect">Correct only</button>
      </div>
    </div>

    <div class="stat" id="visStat"></div>
    <div class="stat" style="margin-top:14px;">Layout: t-SNE of 48-d CLIP category-probability vectors. Drag to pan · scroll to zoom · hover a point for the drawing · click to pin.</div>
  </aside>

  <main id="main">
    <canvas id="cv"></canvas>
    <div id="hint">loading data…</div>
    <div id="card">
      <button id="close">×</button>
      <img id="cardImg" alt="" />
      <div class="cat" id="cardCat"></div>
      <table><tbody id="cardTbl"></tbody></table>
    </div>
  </main>
</div>

<script>
const IMG_BASE_FALLBACKS = ["../", "./", ""]; // resolve drawings relative to repo root or local
let D = null, IMG_BASE = "../";
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const card = document.getElementById("card");

// ---------- color helpers ----------
function lerp(a,b,t){return a+(b-a)*t;}
// viridis-ish stops
const VIRIDIS=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];
function ramp(stops,t){t=Math.max(0,Math.min(1,t));const s=t*(stops.length-1);const i=Math.floor(s),f=s-i;
  const a=stops[i],b=stops[Math.min(i+1,stops.length-1)];
  return `rgb(${Math.round(lerp(a[0],b[0],f))},${Math.round(lerp(a[1],b[1],f))},${Math.round(lerp(a[2],b[2],f))})`;}
function catColor(i,n){return `hsl(${(i*360/n)%360},62%,58%)`;}
function hsl(h,s,l){return `hsl(${h},${s}%,${l}%)`;}

// ---------- view transform ----------
let scale=1, tx=0, ty=0, fit={s:1,ox:0,oy:0};
function worldToScreen(x,y){return [ (x*fit.s+fit.ox)*scale+tx, (y*fit.s+fit.oy)*scale+ty ];}
function screenToWorldX(px){return ((px-tx)/scale - fit.ox)/fit.s;}
function screenToWorldY(py){return ((py-ty)/scale - fit.oy)/fit.s;}

function resize(){
  const r=cv.parentElement.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+"px"; cv.style.height=r.height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeFit(r.width,r.height); draw();
}
function computeFit(w,h){
  // data x,y already in [0,1000]; fit with padding
  const pad=40, s=Math.min((w-2*pad)/1000,(h-2*pad)/1000);
  fit.s=s; fit.ox=(w-1000*s)/2; fit.oy=(h-1000*s)/2;
}

// ---------- filters ----------
const F = { cat:-1, ageMin:2, ageMax:10, recog:0, correctOnly:false };
function passes(i){
  if(F.cat>=0 && D.cat[i]!==F.cat) return false;
  const a=D.age[i]; if(a<F.ageMin||a>F.ageMax) return false;
  if(D.target_prob[i] < F.recog) return false;
  if(F.correctOnly && !D.correct[i]) return false;
  return true;
}

// ---------- color mode ----------
let colorMode="target_prob";
function colorOf(i){
  switch(colorMode){
    case "correct": return D.correct[i] ? "#5ed694" : "#ff6b6b";
    case "target_prob": return ramp(VIRIDIS, D.target_prob[i]);
    case "log_odds": { // typical range ~ -10..6 -> normalize
      const t=(D.log_odds[i]+10)/16; return ramp(VIRIDIS,t); }
    case "age": return hsl(lerp(220,12,(D.age[i]-2)/8), 70, 58);
    case "cat": return catColor(D.cat[i], D.categories.length);
  }
}

// ---------- drawing ----------
let hoverIdx=-1, pinIdx=-1;
function draw(){
  const w=cv.clientWidth,h=cv.clientHeight;
  ctx.clearRect(0,0,w,h);
  const rBase = Math.max(1.1, Math.min(3.4, 1.0*scale));
  const r = rBase;
  ctx.globalAlpha = 0.82;
  for(let i=0;i<D.n;i++){
    if(!passes(i)) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
    if(sx<-4||sy<-4||sx>w+4||sy>h+4) continue;
    ctx.fillStyle=colorOf(i);
    ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill();
  }
  ctx.globalAlpha=1;
  // highlight hovered / pinned
  for(const [idx,col,rad] of [[pinIdx,"#fff",6],[hoverIdx,"#fff",5]]){
    if(idx<0||!passes(idx)) continue;
    const [sx,sy]=worldToScreen(D.x[idx],D.y[idx]);
    ctx.beginPath(); ctx.arc(sx,sy,rad,0,6.283);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(sx,sy,rad-2,0,6.283); ctx.fillStyle=colorOf(idx); ctx.fill();
  }
}

// ---------- nearest point (linear scan, respects filters) ----------
function nearest(px,py){
  let best=-1, bd=14*14;
  for(let i=0;i<D.n;i++){
    if(!passes(i)) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]);
    const dx=sx-px, dy=sy-py, d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=i;}
  }
  return best;
}

// ---------- detail card ----------
function fmt(v,d=2){ return (v==null||isNaN(v)) ? "—" : (+v).toFixed(d); }
function showCard(i){
  if(i<0){return;}
  card.classList.add("show");
  document.getElementById("cardImg").src = IMG_BASE + D.draw_dir + "/" + D.file[i];
  document.getElementById("cardCat").textContent = D.categories[D.cat[i]] + " · age " + D.age[i];
  const guess = D.guess[i]>=0 ? D.categories[D.guess[i]] : "—";
  const ok = D.correct[i];
  document.getElementById("cardTbl").innerHTML = `
    <tr><td class="k">CLIP guess</td><td class="v">${guess} <span class="pill ${ok?'ok':'no'}">${ok?'correct':'wrong'}</span></td></tr>
    <tr><td class="k">target prob</td><td class="v">${fmt(D.target_prob[i],3)}</td></tr>
    <tr><td class="k">max prob</td><td class="v">${fmt(D.max_prob[i],3)}</td></tr>
    <tr><td class="k">log-odds</td><td class="v">${fmt(D.log_odds[i],2)}</td></tr>
    <tr><td class="k"># strokes</td><td class="v">${D.strokes[i]==null?'—':D.strokes[i]}</td></tr>
    <tr><td class="k">draw time (s)</td><td class="v">${fmt(D.duration[i],1)}</td></tr>
    <tr><td class="k">word freq</td><td class="v">${fmt(D.freq[i],1)}</td></tr>`;
}
document.getElementById("close").onclick=()=>{card.classList.remove("show");pinIdx=-1;draw();};

// ---------- legend ----------
function buildLegend(){
  const el=document.getElementById("legend");
  if(colorMode==="correct"){
    el.className="group";
    el.innerHTML=`<div class="row"><span class="sw" style="background:#5ed694"></span>Correctly classified</div>
                  <div class="row"><span class="sw" style="background:#ff6b6b"></span>Misclassified</div>`;
  } else if(colorMode==="cat"){
    el.className="group";
    el.innerHTML=`<div class="stat">48 categories — hover or filter to identify. Color = category hue.</div>`;
  } else {
    el.className="group grad";
    let g; let lo,hi;
    if(colorMode==="target_prob"){lo="0 (unrecognizable)";hi="1 (clear)";}
    else if(colorMode==="log_odds"){lo="low";hi="high";}
    else {lo="age 2";hi="age 10";}
    const stops = colorMode==="age"
      ? `${hsl(220,70,58)}, ${hsl(116,70,58)}, ${hsl(12,70,58)}`
      : VIRIDIS.map(c=>`rgb(${c[0]},${c[1]},${c[2]})`).join(",");
    el.innerHTML=`<div class="bar" style="background:linear-gradient(90deg,${stops})"></div>
                  <div class="gradlabels"><span>${lo}</span><span>${hi}</span></div>`;
  }
}

// ---------- visible stat ----------
function updateStat(){
  let n=0, corr=0, sp=0;
  for(let i=0;i<D.n;i++){ if(passes(i)){n++; corr+=D.correct[i]; sp+=D.target_prob[i];} }
  document.getElementById("visStat").textContent =
    `${n.toLocaleString()} drawings shown · ${n?Math.round(100*corr/n):0}% CLIP-correct · mean recog ${n?(sp/n).toFixed(2):'—'}`;
}

// ---------- interactions ----------
let dragging=false, moved=false, lastX=0, lastY=0;
cv.addEventListener("mousedown",e=>{dragging=true;moved=false;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener("mouseup",()=>{dragging=false;});
cv.addEventListener("mousemove",e=>{
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  if(dragging){ const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    tx+=dx; ty+=dy; lastX=e.clientX; lastY=e.clientY; draw(); return; }
  const h=nearest(px,py);
  if(h!==hoverIdx){ hoverIdx=h; draw(); if(h>=0 && pinIdx<0) showCard(h); else if(h<0 && pinIdx<0) card.classList.remove("show"); }
});
cv.addEventListener("click",e=>{
  if(moved) return;
  const rect=cv.getBoundingClientRect();
  const h=nearest(e.clientX-rect.left, e.clientY-rect.top);
  if(h>=0){ pinIdx=h; showCard(h); draw(); }
});
cv.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  const f=Math.exp(-e.deltaY*0.0015);
  // zoom about cursor
  tx = px - (px-tx)*f; ty = py - (py-ty)*f; scale*=f;
  scale=Math.max(0.4,Math.min(60,scale)); draw();
},{passive:false});

// ---------- controls ----------
document.getElementById("colorby").onchange=e=>{colorMode=e.target.value;buildLegend();draw();};
document.getElementById("catfilter").onchange=e=>{F.cat=+e.target.value;draw();updateStat();};
function syncAge(){
  let lo=+ageMin.value, hi=+ageMax.value; if(lo>hi){[lo,hi]=[hi,lo];}
  F.ageMin=lo;F.ageMax=hi;
  document.getElementById("ageLabel").textContent = lo===hi?`age ${lo}`:`ages ${lo}–${hi}`;
  draw();updateStat();
}
const ageMin=document.getElementById("ageMin"), ageMax=document.getElementById("ageMax");
ageMin.oninput=syncAge; ageMax.oninput=syncAge;
document.getElementById("recog").oninput=e=>{
  F.recog=+e.target.value/100; document.getElementById("recogVal").textContent=`≥ ${e.target.value}%`;
  draw();updateStat();
};
document.getElementById("onlyCorrect").onclick=e=>{
  F.correctOnly=!F.correctOnly; e.target.style.borderColor=F.correctOnly?"#4ea1ff":""; draw();updateStat();
};
document.getElementById("reset").onclick=()=>{scale=1;tx=0;ty=0;resize();};

window.addEventListener("resize",resize);

// ---------- load ----------
async function load(){
  const res=await fetch("points.json"); D=await res.json();
  // populate category filter
  const sel=document.getElementById("catfilter");
  D.categories.forEach((c,i)=>{const o=document.createElement("option");o.value=i;o.textContent=c;sel.appendChild(o);});
  document.getElementById("count").textContent=`${D.n.toLocaleString()} drawings · ${D.categories.length} categories · ages 2–10.`;
  document.getElementById("hint").textContent="drag to pan · scroll to zoom · hover for the drawing";
  // probe image base so it works whether served from repo root or explorer/
  await probeBase();
  buildLegend(); resize(); updateStat();
}
function probeBase(){
  return new Promise(resolve=>{
    let k=0;
    const test=()=>{
      if(k>=IMG_BASE_FALLBACKS.length){resolve();return;}
      const im=new Image();
      im.onload=()=>{IMG_BASE=IMG_BASE_FALLBACKS[k];resolve();};
      im.onerror=()=>{k++;test();};
      im.src=IMG_BASE_FALLBACKS[k]+D.draw_dir+"/"+D.file[0];
    };
    test();
  });
}
load();
</script>
</body>
</html>
